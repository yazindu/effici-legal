<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password - Effici</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7fb;
            --card: #fff;
            --text: #1c2333;
            --muted: #5a6278;
            --primary: #1f4fd6;
            --danger: #b42318;
            --ok: #166534;
            --border: #d9deea;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 35%);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            width: min(760px, 92vw);
            margin: 2rem auto 4rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 12px 36px rgba(28, 42, 79, 0.08);
        }

        h1 { margin: 0 0 0.8rem; line-height: 1.25; }
        p { color: var(--muted); margin: 0.5rem 0; }

        .form-row { margin-top: 1rem; }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: var(--text);
        }

        input[type="password"] {
            width: 100%;
            padding: 0.72rem 0.82rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        button {
            margin-top: 0.9rem;
            border: 0;
            border-radius: 10px;
            padding: 0.72rem 1rem;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .status {
            margin-top: 0.8rem;
            min-height: 1.2rem;
            font-weight: 600;
            color: var(--ok);
        }

        .error {
            margin-top: 0.8rem;
            min-height: 1.2rem;
            color: var(--danger);
            font-weight: 600;
        }
    </style>
</head>
<body>
<main class="container">
    <section class="card">
        <h1>Reset Password</h1>
        <p id="intro-text">Validating your secure reset link...</p>
        <p id="email-text"></p>

        <div class="form-row">
            <label for="password">New password</label>
            <input id="password" type="password" minlength="8" autocomplete="new-password" placeholder="At least 8 characters" disabled>
        </div>
        <div class="form-row">
            <label for="confirm-password">Confirm new password</label>
            <input id="confirm-password" type="password" minlength="8" autocomplete="new-password" placeholder="Re-enter password" disabled>
        </div>

        <button id="update-btn" type="button" disabled>Update Password</button>
        <div id="status" class="status"></div>
        <div id="error" class="error"></div>
    </section>
</main>

<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.57.4";

    const SUPABASE_URL = "https://gddeglmchwqxesqqncif.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_FDB4Y8z7HrCaA8aeeaBSAg_iYBsHX2v";

    const MIN_PASSWORD_LENGTH = 8;
    const introEl = document.getElementById("intro-text");
    const emailEl = document.getElementById("email-text");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirm-password");
    const updateBtn = document.getElementById("update-btn");

    function setStatus(message = "", isError = false) {
        if (isError) {
            errorEl.textContent = message;
            statusEl.textContent = "";
            return;
        }
        statusEl.textContent = message;
        errorEl.textContent = "";
    }

    function isConfigured() {
        return (
            SUPABASE_URL.startsWith("https://") &&
            SUPABASE_ANON_KEY &&
            !SUPABASE_URL.includes("YOUR_PROJECT_REF") &&
            !SUPABASE_ANON_KEY.includes("YOUR_SUPABASE_ANON_KEY")
        );
    }

    function clearAuthParamsFromUrl() {
        const cleanUrl = `${window.location.origin}${window.location.pathname}`;
        window.history.replaceState({}, document.title, cleanUrl);
    }

    function validatePassword(password, confirmPassword) {
        if (!password || !confirmPassword) return "Both password fields are required.";
        if (password.length < MIN_PASSWORD_LENGTH) return `Password must be at least ${MIN_PASSWORD_LENGTH} characters.`;
        if (password !== confirmPassword) return "Passwords do not match.";
        return null;
    }

    async function establishRecoverySession(supabase) {
        const query = new URLSearchParams(window.location.search);
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const code = query.get("code");
        const accessToken = hash.get("access_token");
        const refreshToken = hash.get("refresh_token");
        const hashType = hash.get("type");

        if (code) {
            const { error } = await supabase.auth.exchangeCodeForSession(code);
            if (error) throw error;
        } else if (accessToken && refreshToken && hashType === "recovery") {
            const { error } = await supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            });
            if (error) throw error;
        } else {
            throw new Error("Invalid or expired reset link. Request a new password reset email.");
        }

        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;
        if (!data.session || data.session.user == null) {
            throw new Error("Invalid or expired reset link. Request a new password reset email.");
        }
        return data.session;
    }

    async function init() {
        if (!isConfigured()) {
            introEl.textContent = "Page is not configured yet.";
            setStatus("Set SUPABASE_URL and SUPABASE_ANON_KEY before use.", true);
            return;
        }

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false
            }
        });

        let session;
        try {
            session = await establishRecoverySession(supabase);
            clearAuthParamsFromUrl();
            introEl.textContent = "Link verified. Set your new password:";
            emailEl.textContent = session.user.email ?? "";
            passwordEl.disabled = false;
            confirmPasswordEl.disabled = false;
            updateBtn.disabled = false;
        } catch (error) {
            introEl.textContent = "Could not verify your reset link.";
            setStatus(error?.message ?? "Unable to verify reset link.", true);
            return;
        }

        updateBtn.addEventListener("click", async () => {
            const password = passwordEl.value;
            const confirmPassword = confirmPasswordEl.value;
            const validationError = validatePassword(password, confirmPassword);
            if (validationError) {
                setStatus(validationError, true);
                return;
            }

            updateBtn.disabled = true;
            passwordEl.disabled = true;
            confirmPasswordEl.disabled = true;
            setStatus("Updating password...");

            try {
                const { error } = await supabase.auth.updateUser({ password });
                if (error) throw error;
                await supabase.auth.signOut();
                setStatus("Password updated. Return to Effici and sign in.");
                introEl.textContent = "Password reset completed.";
                emailEl.textContent = "";
                passwordEl.value = "";
                confirmPasswordEl.value = "";
            } catch (error) {
                setStatus(error?.message ?? "Failed to update password.", true);
                updateBtn.disabled = false;
                passwordEl.disabled = false;
                confirmPasswordEl.disabled = false;
            }
        });
    }

    init();
</script>
<script src="assets/build-meta.js"></script>
<script src="assets/build-footer.js" defer></script>
</body>
</html>
